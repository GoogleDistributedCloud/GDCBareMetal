# Stateless application specification
# The Deployment creates a single replicated Pod, indicated by the 'replicas' field
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    anthos-migrate.cloud.google.com/type: linux-container
    app: ledgermonolith-service
    migrate-for-anthos-optimization: "true"
    migrate-for-anthos-version: v1.14.0
  name: ledgermonolith-service
spec:
  replicas: 1
  selector:
    matchLabels:
      anthos-migrate.cloud.google.com/type: linux-container
      app: ledgermonolith-service
      migrate-for-anthos-optimization: "true"
      migrate-for-anthos-version: v1.14.0
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        anthos-migrate.cloud.google.com/type: linux-container
        app: ledgermonolith-service
        migrate-for-anthos-optimization: "true"
        migrate-for-anthos-version: v1.14.0
    spec:
      containers:
      - env:
        - name: HC_V2K_SERVICE_MANAGER
          value: "true"
        image: gcr.io/anthos-old/ledgermonolith-service:12-27-2022--4-12-5
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /gamma
            - probe
        name: ledgermonolith-service
        readinessProbe:
          exec:
            command:
            - /gamma
            - probe
        resources: {}

---
# Headless Service specification -
# No load-balancing, and a single cluster internal IP, only reachable from within the cluster
# The Kubernetes endpoints controller will modify the DNS configuration to return records (addresses) that point to the Pods, which are labeled with "app": "ledgermonolith-service"
#apiVersion: v1
#kind: Service
#metadata:
#  creationTimestamp: null
#  labels:
#    anthos-migrate.cloud.google.com/type: linux-container
#    migrate-for-anthos-optimization: "true"
#    migrate-for-anthos-version: v1.14.0
#  name: ledgermonolith-service
#spec:
#  clusterIP: None
#  selector:
#    app: ledgermonolith-service
#  type: ClusterIP
#---
  apiVersion: v1
  kind: Service
  metadata:
    name: ledgermonolith-service
  spec:
    selector:
      app: ledgermonolith-service
    ports:
      - protocol: TCP
        port: 80
        targetPort: 80
    type: LoadBalancer